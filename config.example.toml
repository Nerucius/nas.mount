[connection]
host = "example.org"
port = 445
user = "user"
password = ""  # or set NAS_MOUNT_PASSWORD env var

[tuning]
read_size = 4194304        # 4 MB - SMB read request / read-ahead window size
write_size = 4194304       # 4 MB - SMB write request size
read_pipeline_depth = 3    # concurrent read requests in flight per stream
write_pipeline_depth = 4   # concurrent write requests in flight per file
readahead_windows = 2      # background prefetch windows per file
readahead_workers = 8      # shared prefetch thread pool size
write_buffer_chunks = 3    # coalescer pressure limit, in write_size units
dir_cache_ttl = 300        # directory listing cache in seconds
file_info_timeout = 5000   # ms the Windows kernel caches file metadata (WinFsp)
dir_info_timeout = 1000    # ms the kernel caches listings (short: renames/deletes show promptly)
reconnect_delay = 5        # seconds before reconnect attempt
max_reconnect_attempts = 10

[mounts]
M = "storage/media"
Y = "storage/documents"
Z = "storage/backups"

[labels]
M = "TrueNAS Media"
Y = "TrueNAS Documents"
Z = "TrueNAS Backups"

[macos]
mount_root = "~/nas"     # each mount lands at <mount_root>/<subpath basename>
rwsize = 1048576         # FUSE-T NFS transfer size (default 32K without this)
daemon_timeout = 600     # seconds before the kernel force-ejects a slow volume
# Optional explicit mountpoint overrides per drive key:
# [macos.mounts]
# M = "/Volumes/nas-media"
